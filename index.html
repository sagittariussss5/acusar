<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janilito Acusar | Employee Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #FFD60A; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #000;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #FFD60A 0%, #FFC300 40%, #001F54 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            width: 95%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #001F54;
            border-radius: 30px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .profile-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #001F54;
            padding: 3px;
            background: white;
        }

        h2 {
            font-size: 24px;
            margin: 10px 0 5px;
            font-weight: 700;
            color: #001F54;
            letter-spacing: -0.5px;
        }

        .position {
            color: #001F54; 
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .company {
            font-size: 12px;
            color: #444;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .info-grid {
            background: rgba(0, 31, 84, 0.05);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid rgba(0, 31, 84, 0.1);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #001F54;
        }

        .info-item:last-child { margin-bottom: 0; }

        .info-item i {
            color: #FFC300;
            background: #001F54;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            width: 30px;
            text-align: center;
        }

        /* Highlight for Emergency Contact */
        .info-item.emergency i {
            background: #d90429;
            color: #fff;
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-save {
            background: #001F54;
            color: #FFD60A;
        }

        .btn-call {
            background: #fff;
            color: #001F54;
            border: 2px solid #001F54;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,31,84,0.3);
        }
    </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="card">
    <div class="profile-wrapper">
        <img src="Acusar.png" class="photo" alt="Janilito Acusar">
    </div>

    <h2>Janilito Acusar</h2>
    <div class="position">Mechanic</div>
    <div class="company">Golden Continental Port Terminal Services Inc.</div>

    <div class="info-grid">
        <div class="info-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Zone 16 Sta. Cruz, Tagoloan, Misamis Oriental</span>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-phone"></i>
            <span>0917-123-4567</span>
        </div>
        <div class="info-item emergency">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span><strong>ICE:</strong> Rosalie Roxas Acusar<br>09536142143</span>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn btn-save" id="saveBtn">
            <i class="fa-solid fa-user-plus"></i> Save
        </button>
        <a href="tel:09171234567" class="btn btn-call">
            <i class="fa-solid fa-phone"></i> Call
        </a>
    </div>
</div>

<script>
    const contact = {
        firstName: "Janilito",
        lastName: "Acusar",
        org: "Golden Continental Port Terminal Services Inc.",
        title: "Mechanic",
        phone: "09367890239",
        city: "Purok 6 Tubod, Casinglot, Tagoloan",
        region: "Misamis Oriental 9001",
        country: "Philippines",
        photoUrl: "Acusar.png",
        iceName: "Rosalie Roxas Acusar",
        icePhone: "09536142143"
    };

    document.getElementById("saveBtn").onclick = async function() {
        try {
            const response = await fetch(contact.photoUrl);
            const blob = await response.blob();
            const reader = new FileReader();

            reader.readAsDataURL(blob);
            reader.onloadend = function() {
                const base64Photo = reader.result.split(',')[1];
                generateVCard(contact, base64Photo);
            };
        } catch (err) {
            console.warn("Photo fetch failed, saving without photo.");
            generateVCard(contact, null);
        }
    };

    function generateVCard(contact, base64Photo) {
        const vCardLines = [
            "BEGIN:VCARD",
            "VERSION:3.0",
            `N:${contact.lastName};${contact.firstName};;;`,
            `FN:${contact.firstName} ${contact.lastName}`,
            `ORG:${contact.org}`,
            `TITLE:${contact.title}`,
            `TEL;TYPE=CELL,VOICE:${contact.phone}`,
            `ADR;TYPE=HOME:;;;${contact.city};${contact.region};;${contact.country}`,
            `NOTE:EMERGENCY CONTACT (ICE): ${contact.iceName} - ${contact.icePhone}`
        ];

        if (base64Photo) {
            vCardLines.push(`PHOTO;TYPE=PNG;ENCODING=b:${base64Photo}`);
        }

        vCardLines.push("END:VCARD");

        const vCardString = vCardLines.join("\n");
        const vCardBlob = new Blob([vCardString], { type: "text/vcard" });
        const url = window.URL.createObjectURL(vCardBlob);
        
        const a = document.createElement("a");
        a.href = url;
        a.download = `${contact.firstName}_${contact.lastName}.vcf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
