<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janilito Acusar | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary-yellow: #FFD60A;
            --dark-blue: #001F54;
            --accent-gold: #FFC300;
            --emergency-red: #D90429;
            --text-main: #000814;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--primary-yellow);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--primary-yellow) 0%, var(--accent-gold) 30%, var(--dark-blue) 100%);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 31, 84, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .profile-header { margin-bottom: 25px; }

        .photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid var(--dark-blue);
            padding: 5px;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 32px;
            margin: 15px 0 5px;
            font-weight: 800;
            color: var(--dark-blue);
            letter-spacing: -1px;
        }

        .position {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .company {
            font-size: 15px;
            font-weight: 600;
            color: #555;
            line-height: 1.4;
            max-width: 280px;
            margin: 0 auto 30px;
        }

        /* Information Grid */
        .info-stack {
            text-align: left;
            margin-bottom: 25px;
        }

        .info-box {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(0, 31, 84, 0.04);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 31, 84, 0.05);
        }

        .info-box i {
            font-size: 20px; /* Bigger Icons */
            color: var(--accent-gold);
            background: var(--dark-blue);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            flex-shrink: 0;
        }

        .info-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--dark-blue);
            line-height: 1.5;
        }

        /* Stunning ICE Box */
        .ice-container {
            background: var(--emergency-red);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(217, 4, 41, 0.2);
        }

        .ice-container i {
            font-size: 24px;
            background: rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .ice-info { text-align: left; }
        .ice-info .label { 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            opacity: 0.9;
        }
        .ice-info .name { font-size: 17px; font-weight: 700; display: block; margin-top: 2px; }
        .ice-info .num { font-size: 15px; font-weight: 600; opacity: 0.9; }

        /* Buttons */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            height: 60px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
        }

        .btn-save { background: var(--dark-blue); color: var(--primary-yellow); }
        .btn-call { background: white; color: var(--dark-blue); border: 2.5px solid var(--dark-blue); }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 31, 84, 0.2); }
        .btn:active { transform: translateY(0); }

    </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="card">
    <div class="profile-header">
        <img src="Acusar.png" class="photo" alt="Janilito Acusar">
        <h2>Janilito Acusar</h2>
        <div class="position">Professional Mechanic</div>
        <div class="company">Golden Continental Port Terminal Services Inc.</div>
    </div>

    <div class="info-stack">
        <div class="info-box">
            <i class="fa-solid fa-map-location-dot"></i>
            <div class="info-text">Purok 6 Tubod, Casinglot, Tagoloan, Misamis Oriental 9001, Philippines</div>
        </div>
        <div class="info-box">
            <i class="fa-solid fa-mobile-screen-button"></i>
            <div class="info-text">0917-123-4567</div>
        </div>
    </div>

    <div class="ice-container">
        <i class="fa-solid fa-suitcase-medical"></i>
        <div class="ice-info">
            <span class="label">Emergency Contact (ICE)</span>
            <span class="name">Rosalie Roxas Acusar</span>
            <span class="num">0953-614-2143</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-save" id="saveBtn">
            <i class="fa-solid fa-plus"></i> Save
        </button>
        <a href="tel:09171234567" class="btn btn-call">
            <i class="fa-solid fa-phone"></i> Call
        </a>
    </div>
</div>

<script>
    const contact = {
        firstName: "Janilito",
        lastName: "Acusar",
        org: "Golden Continental Port Terminal Services Inc.",
        title: "Mechanic",
        phone: "09367890239",
        city: "Purok 6 Tubod, Casinglot, Tagoloan",
        region: "Misamis Oriental 9001",
        country: "Philippines",
        photoUrl: "Acusar.png",
        iceName: "Rosalie Roxas Acusar",
        icePhone: "09536142143"
    };

    document.getElementById("saveBtn").onclick = async function() {
        try {
            const response = await fetch(contact.photoUrl);
            const blob = await response.blob();
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => downloadVCard(contact, reader.result.split(',')[1]);
        } catch {
            downloadVCard(contact, null);
        }
    };

    function downloadVCard(contact, photo) {
        const lines = [
            "BEGIN:VCARD", "VERSION:3.0",
            `N:${contact.lastName};${contact.firstName};;;`,
            `FN:${contact.firstName} ${contact.lastName}`,
            `ORG:${contact.org}`, `TITLE:${contact.title}`,
            `TEL;TYPE=CELL,VOICE:${contact.phone}`,
            `ADR;TYPE=WORK:;;;${contact.city};${contact.region};;${contact.country}`,
            `NOTE:EMERGENCY CONTACT: ${contact.iceName} (${contact.icePhone})`
        ];
        if (photo) lines.push(`PHOTO;TYPE=PNG;ENCODING=b:${photo}`);
        lines.push("END:VCARD");

        const blob = new Blob([lines.join("\n")], { type: "text/vcard" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${contact.firstName}_Profile.vcf`;
        a.click();
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
