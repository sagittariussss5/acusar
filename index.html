<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vCard Generator - Janilito Acusar</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Save Contact</h2>
        <p>Janilito Acusar<br><small>Mechanic</small></p>
        <button id="saveBtn">Download Contact</button>
    </div>

    <script>
        document.getElementById("saveBtn").onclick = async function() {
            // --- CONFIGURATION ---
            const firstName = "Janilito";
            const lastName = "Acusar";
            const org = "Golden Continental Port Terminal Services Inc.";
            const title = "Mechanic";
            const phone = "09171234567";
            
            // For the photo: Use a URL to a square profile picture.
            // NOTE: The image must allow CORS or be on the same domain.
            const photoUrl = "https://via.placeholder.com/200"; 

            try {
                // Fetch and convert image to Base64
                const response = await fetch(photoUrl);
                const blob = await response.blob();
                const reader = new FileReader();
                
                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    const base64Data = reader.result.split(',')[1];

                    // --- VCARD CONSTRUCTION ---
                    // N: (Name) is what phones use for sorting/displaying names.
                    // FN: (Formatted Name) is the full string display.
                    const vCard = [
                        "BEGIN:VCARD",
                        "VERSION:3.0",
                        `N:${lastName};${firstName};;;`, 
                        `FN:${firstName} ${lastName}`,
                        `ORG:${org}`,
                        `TITLE:${title}`,
                        `TEL;TYPE=CELL:${phone}`,
                        `PHOTO;TYPE=JPEG;ENCODING=b:${base64Data}`,
                        "END:VCARD"
                    ].join("\n");

                    // --- DOWNLOAD LOGIC ---
                    const vCardBlob = new Blob([vCard], { type: "text/vcard" });
                    const url = window.URL.createObjectURL(vCardBlob);
                    const a = document.createElement("a");
                    
                    a.href = url;
                    a.download = `${firstName}_${lastName}.vcf`;
                    document.body.appendChild(a);
                    a.click();
                    
                    // Cleanup
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                };
            } catch (err) {
                alert("Could not load photo. Check your image link or CORS settings.");
                console.error(err);
            }
        };
    </script>

</body>
</html>
