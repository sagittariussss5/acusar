<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Card - Janilito Acusar</title>
    <style>
        /* Blue and Yellow Theme */
        :root {
            --primary-blue: #003366;
            --accent-yellow: #FFCC00;
            --light-gray: #f4f4f4;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background-color: var(--light-gray); 
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 8px solid var(--primary-blue);
            width: 300px;
        }

        .profile-icon {
            font-size: 50px;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }

        h2 { 
            color: var(--primary-blue); 
            margin: 10px 0 5px 0;
            font-size: 22px;
        }

        p { 
            color: #666; 
            margin: 0 0 20px 0;
            font-size: 14px;
            line-height: 1.4;
        }

        .company-tag {
            font-weight: bold;
            color: var(--primary-blue);
        }

        button { 
            background: var(--accent-yellow); 
            color: var(--primary-blue); 
            border: none; 
            padding: 14px 28px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover { 
            background: #e6b800; 
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-icon">👤</div>
        <h2>Janilito Acusar</h2>
        <p>Mechanic<br>
        <span class="company-tag">Golden Continental Port Terminal Services Inc.</span></p>
        
        <button id="saveBtn">DOWNLOAD VCARD</button>
    </div>

    <script>
        document.getElementById("saveBtn").onclick = async function() {
            // Data Setup
            const contact = {
                firstName: "Janilito",
                lastName: "Acusar",
                org: "Golden Continental Port Terminal Services Inc.",
                title: "Mechanic",
                phone: "09171234567",
                // Ensure this URL is a direct link to a JPEG/PNG
                photoUrl: "https://via.placeholder.com/200/003366/FFCC00?text=JA" 
            };

            try {
                // 1. Convert Image to Base64
                const response = await fetch(contact.photoUrl);
                const blob = await response.blob();
                const reader = new FileReader();

                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    const base64Photo = reader.result.split(',')[1];

                    // 2. Build the vCard 3.0 String
                    // We use "N" to force the name as the primary identifier
                    const vCard = [
                        "BEGIN:VCARD",
                        "VERSION:3.0",
                        `N:${contact.lastName};${contact.firstName};;;`,
                        `FN:${contact.firstName} ${contact.lastName}`,
                        `ORG:${contact.org}`,
                        `TITLE:${contact.title}`,
                        `TEL;TYPE=CELL,VOICE:${contact.phone}`,
                        `PHOTO;TYPE=JPEG;ENCODING=b:${base64Photo}`,
                        "END:VCARD"
                    ].join("\n");

                    // 3. Create the Blob and Trigger Download
                    const vCardBlob = new Blob([vCard], { type: "text/vcard" });
                    const url = window.URL.createObjectURL(vCardBlob);
                    const a = document.createElement("a");
                    
                    a.href = url;
                    a.download = `${contact.firstName}_${contact.lastName}.vcf`;
                    document.body.appendChild(a);
                    a.click();
                    
                    // Cleanup
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                };
            } catch (err) {
                alert("Error fetching photo. Saving contact without picture.");
                // Fallback: Save without photo if image fetch fails (CORS issue)
                saveWithoutPhoto(contact);
            }
        };

        function saveWithoutPhoto(contact) {
            const vCard = `BEGIN:VCARD\nVERSION:3.0\nN:${contact.lastName};${contact.firstName};;;\nFN:${contact.firstName} ${contact.lastName}\nORG:${contact.org}\nTITLE:${contact.title}\nTEL;TYPE=CELL:${contact.phone}\nEND:VCARD`;
            const blob = new Blob([vCard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${contact.firstName}_${contact.lastName}.vcf`;
            a.click();
        }
    </script>

</body>
</html>
