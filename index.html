<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acusar</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #001F54, #1282A2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    width: 90%;
    max-width: 340px;
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
}

/* Top Accent */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #FFD60A, #1282A2);
}

/* Photo */
.photo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #FFD60A;
    margin-bottom: 12px;
}

/* Text */
h2 {
    margin: 5px 0;
    font-size: 20px;
    color: #0A1128;
}

.position {
    font-size: 14px;
    color: #1282A2;
    font-weight: 500;
}

.company {
    font-size: 13px;
    color: #777;
    margin-bottom: 15px;
}

/* Details */
.details {
    text-align: left;
    margin-top: 15px;
}

.item {
    display: flex;
    align-items: center;
    margin: 10px 0;
    font-size: 14px;
    color: #333;
}

.item i {
    width: 30px;
    color: #1282A2;
    font-size: 16px;
}

/* Buttons */
.btn {
    display: block;
    margin-top: 12px;
    padding: 12px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s;
}

/* Add Contact Button */
.btn-contact {
    background: linear-gradient(90deg, #FFD60A, #FFC300);
    color: #0A1128;
}

.btn-contact:hover {
    transform: translateY(-2px);
}

/* Call Button */
.btn-call {
    background: #1282A2;
    color: #fff;
}

.btn-call:hover {
    background: #0e6d86;
}
</style>
</head>

<body>

<div class="card">
    <img src="Acusar.png" class="photo" alt="Employee Photo">

    <h2>Janilito Acusar</h2>
    <div class="position">Mechanic</div>
    <div class="company">Golden Continental Port Terminal Services Inc.</div>

    <div class="details">
        <div class="item">
            <i class="fa-solid fa-briefcase"></i>
            Mechanic
        </div>

        <div class="item">
            <i class="fa-solid fa-location-dot"></i>
            Zone 16 Sta. Cruz, Tagoloan, Misamis Oriental 9001, Philippines
        </div>

        <div class="item">
            <i class="fa-solid fa-phone"></i>
            0917-123-4567
        </div>
    </div>

    <!-- Add to Contacts (WORKING) -->
    <a class="btn btn-contact" download="Janilito_Acusar.vcf"
       href="data:text/vcard;charset=utf-8,
BEGIN:VCARD
VERSION:3.0
FN:Janilito Acusar
ORG:Golden Continental Port Terminal Services Inc.
TITLE:Mechanic
TEL;TYPE=CELL:09171234567
ADR:;;Zone 16 Sta. Cruz, Tagoloan, Misamis Oriental 9001, Philippines
END:VCARD">
        <i class="fa-solid fa-user-plus"></i> Add to Contacts
    </a>

    <!-- Call -->
    <a class="btn btn-call" href="tel:09171234567">
        <i class="fa-solid fa-phone"></i> Call Now
    </a>

</div>

</body>
</html>
